# MongoDB — set MONGODB_URI for Atlas, or uses local MongoDB by default
# Atlas example:
# mongodb+srv://USER:PASSWORD@cluster0.xxxxx.mongodb.net/gsr_homeocare_db?retryWrites=true&w=majority

spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/gsr_homeocare_db}
spring.data.mongodb.database=gsr_homeocare_db

# MongoDB Atlas organization ID
app.mongodb.organization-id=${APP_MONGODB_ORGANIZATION_ID:6a126d53e091a2b24b63a82c}
