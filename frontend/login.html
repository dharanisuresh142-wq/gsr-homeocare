<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | GSR Homeocare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html"><i class="bi bi-heart-pulse-fill me-2"></i>GSR Homeocare</a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="index.html">Back to Home</a>
      </div>
    </div>
  </nav>

  <main class="container py-5" style="max-width: 520px;">
    <h1 class="section-title text-center h3 mb-4">Login / Register</h1>

    <ul class="nav nav-pills nav-fill mb-4" id="loginTabs" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#customerTab" type="button">Customer</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" data-bs-toggle="pill" data-bs-target="#adminTab" type="button">Admin</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" data-bs-toggle="pill" data-bs-target="#registerTab" type="button">Register</button>
      </li>
    </ul>

    <div class="tab-content">
      <div class="tab-pane fade show active" id="customerTab">
        <div class="form-card">
          <h5 class="mb-3"><i class="bi bi-person me-2"></i>Customer login</h5>
          <form id="customerLoginForm">
            <div class="mb-3">
              <label class="form-label">Phone number</label>
              <input type="tel" class="form-control" id="customerPhone" required placeholder="10-digit mobile">
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" id="customerPassword" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg">Login</button>
          </form>
          <p class="small text-muted mt-3 mb-0">New user? Switch to <strong>Register</strong> tab.</p>
        </div>
      </div>

      <div class="tab-pane fade" id="adminTab">
        <div class="form-card">
          <h5 class="mb-3"><i class="bi bi-shield-lock me-2"></i>Admin login</h5>
          <form id="adminLoginForm">
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" class="form-control" id="adminUsername" required value="admin" autocomplete="username">
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" id="adminPassword" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-success w-100 btn-lg">Admin Login</button>
          </form>
          <p class="small text-muted mt-3 mb-0">Default: username <code>admin</code> · password <code>GsrAdmin2026</code></p>
        </div>
      </div>

      <div class="tab-pane fade" id="registerTab">
        <div class="form-card">
          <h5 class="mb-3"><i class="bi bi-person-plus me-2"></i>Create account</h5>
          <form id="registerForm">
            <div class="mb-3">
              <label class="form-label">Full name</label>
              <input type="text" class="form-control" id="regName" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Phone</label>
              <input type="tel" class="form-control" id="regPhone" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Email (optional)</label>
              <input type="email" class="form-control" id="regEmail">
            </div>
            <div class="mb-3">
              <label class="form-label">Password (min 6 characters)</label>
              <input type="password" class="form-control" id="regPassword" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg">Register</button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/script.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
