<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | GSR Homeo Care Centre</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">GSR</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center"></ul>
      </div>
    </div>
  </nav>

  <main class="container py-5" style="max-width: 520px;">
    <h1 class="section-title text-center h3 mb-4" id="loginPageTitle">Login</h1>

    <!-- Customer area (hidden when ?staff=1) -->
    <div id="customerLoginArea">
      <ul class="nav nav-pills nav-fill mb-4" id="loginTabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#customerTab" type="button">Login</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" data-bs-toggle="pill" data-bs-target="#registerTab" type="button">Register</button>
        </li>
      </ul>

      <div class="tab-content">
        <div class="tab-pane fade show active" id="customerTab">
          <div class="form-card">
            <h5 class="mb-3"><i class="bi bi-person me-2"></i>Customer login</h5>
            <form id="customerLoginForm">
              <div class="mb-3">
                <label class="form-label">Phone number</label>
                <input type="tel" class="form-control" id="customerPhone" required placeholder="10-digit mobile">
              </div>
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="customerPassword" required minlength="6">
              </div>
              <button type="submit" class="btn btn-primary w-100 btn-lg">Login</button>
            </form>
            <p class="small text-muted mt-3 mb-0">New user? Switch to <strong>Register</strong> tab.</p>
          </div>
        </div>

        <div class="tab-pane fade" id="registerTab">
          <div class="form-card">
            <h5 class="mb-3"><i class="bi bi-person-plus me-2"></i>Create account</h5>
            <form id="registerForm">
              <div class="mb-3">
                <label class="form-label">Full name</label>
                <input type="text" class="form-control" id="regName" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Phone</label>
                <input type="tel" class="form-control" id="regPhone" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Email (optional)</label>
                <input type="email" class="form-control" id="regEmail">
              </div>
              <div class="mb-3">
                <label class="form-label">Password (min 6 characters)</label>
                <input type="password" class="form-control" id="regPassword" required minlength="6">
              </div>
              <button type="submit" class="btn btn-primary w-100 btn-lg">Register</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Admin area (only visible with ?staff=1 — not linked for customers) -->
    <div id="staffLoginArea" class="d-none">
      <div class="form-card border-success">
        <h5 class="mb-2"><i class="bi bi-shield-lock me-2"></i>Admin login</h5>
        <p class="small text-muted mb-3">Clinic staff only.</p>
        <form id="adminLoginForm">
          <div class="mb-3">
            <label class="form-label" for="adminUsername">Username</label>
            <input type="text" class="form-control" id="adminUsername" required autocomplete="username">
          </div>
          <div class="mb-3">
            <label class="form-label" for="adminPassword">Password</label>
            <input type="password" class="form-control" id="adminPassword" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-success w-100 btn-lg">Login to Admin Panel</button>
        </form>
        <p class="small text-muted mt-3 mb-0 text-center">
          <a href="login.html">← Customer login</a>
        </p>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/config.js"></script>
  <script src="js/script.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
