<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback | GSR Homeo Care Centre</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light sticky-top pro-navbar">
    <div class="container">
      <a class="navbar-brand" href="index.html">GSR</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="navbarNav"><ul class="navbar-nav ms-auto align-items-lg-center"></ul></div>
    </div>
  </nav>

  <header class="page-hero">
    <div class="container">
      <h1 class="page-hero-title">Your Feedback</h1>
      <p class="page-hero-sub mb-0">Help us improve your care experience</p>
    </div>
  </header>

  <main class="container pb-5">
    <div class="row justify-content-center">
      <div class="col-lg-7">
        <div class="pro-card p-4">
          <form id="feedbackForm">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Your name</label>
                <input type="text" class="form-control" id="fbName" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Phone</label>
                <input type="tel" class="form-control" id="fbPhone" required>
              </div>
              <div class="col-12">
                <label class="form-label">Rating</label>
                <select class="form-select" id="fbRating" required>
                  <option value="5">★★★★★ Excellent</option>
                  <option value="4">★★★★☆ Good</option>
                  <option value="3">★★★☆☆ Average</option>
                  <option value="2">★★☆☆☆ Fair</option>
                  <option value="1">★☆☆☆☆ Poor</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label">Your feedback</label>
                <textarea class="form-control" id="fbMessage" rows="4" required placeholder="How was your consultation, medicines, and delivery?"></textarea>
              </div>
              <div class="col-12">
                <button type="submit" class="btn btn-primary w-100 btn-lg">Submit feedback</button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer"><div class="container text-center"><p class="mb-0">&copy; 2026 GSR Homeo Care Centre</p></div></footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/config.js"></script>
  <script src="js/script.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/clinic.js"></script>
</body>
</html>
