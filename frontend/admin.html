<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | GSR Homeocare System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html"><i class="bi bi-heart-pulse-fill me-2"></i>GSR Homeocare</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="consultation.html">Consultation</a></li>
          <li class="nav-item"><a class="nav-link" href="tracking.html">Tracking</a></li>
          <li class="nav-item"><a class="nav-link" href="admin.html">Admin</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="page-header">
    <div class="container">
      <h1 class="section-title mb-0">Admin Panel</h1>
      <p class="text-muted mb-0">Manage products, orders, and consultations</p>
    </div>
  </div>

  <main class="container pb-5">
    <section class="admin-section">
      <h3 class="section-title">Add Product</h3>
      <div class="form-card">
        <form id="adminProductForm">
          <div class="row g-3">
            <div class="col-md-6">
              <label for="productName" class="form-label">Product Name</label>
              <input type="text" class="form-control" id="productName" required>
            </div>
            <div class="col-md-6">
              <label for="productPrice" class="form-label">Price (₹)</label>
              <input type="number" class="form-control" id="productPrice" required min="0.01" step="0.01">
            </div>
            <div class="col-12">
              <label for="productDescription" class="form-label">Description</label>
              <textarea class="form-control" id="productDescription" rows="3"></textarea>
            </div>
            <div class="col-12">
              <label for="productImage" class="form-label">Image URL</label>
              <input type="url" class="form-control" id="productImage" placeholder="https://example.com/image.jpg">
            </div>
            <div class="col-12">
              <button type="submit" class="btn btn-primary">
                <i class="bi bi-plus-circle me-2"></i>Add Product
              </button>
            </div>
          </div>
        </form>
      </div>
    </section>

    <section class="admin-section">
      <h3 class="section-title">Update Order Status</h3>
      <div class="form-card">
        <form id="adminOrderForm">
          <div class="row g-3 align-items-end">
            <div class="col-md-4">
              <label for="updateOrderId" class="form-label">Order ID</label>
              <input type="text" class="form-control" id="updateOrderId" required placeholder="MongoDB order ID">
            </div>
            <div class="col-md-4">
              <label for="orderStatus" class="form-label">Status</label>
              <select class="form-select" id="orderStatus" required>
                <option value="Ordered">Ordered</option>
                <option value="Processing">Processing</option>
                <option value="Shipped">Shipped</option>
                <option value="Delivered">Delivered</option>
              </select>
            </div>
            <div class="col-md-4">
              <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-arrow-repeat me-2"></i>Update Status
              </button>
            </div>
          </div>
        </form>
      </div>
    </section>

    <section class="admin-section">
      <h3 class="section-title">Consultation Bookings</h3>
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-success">
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Phone</th>
              <th>Problem</th>
              <th>Mode</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="consultationsTableBody">
            <tr>
              <td colspan="6" class="text-center text-muted">Loading consultations...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container text-center">
      <p class="mb-0">&copy; 2026 GSR Homeocare System</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
