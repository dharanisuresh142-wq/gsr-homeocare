<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Consultation | GSR Homeocare System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html"><i class="bi bi-heart-pulse-fill me-2"></i>GSR Homeocare</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="consultation.html">Consultation</a></li>
          <li class="nav-item"><a class="nav-link" href="tracking.html">Tracking</a></li>
          <li class="nav-item"><a class="nav-link" href="admin.html">Admin</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="page-header">
    <div class="container">
      <h1 class="section-title mb-0">Book a Consultation</h1>
      <p class="text-muted mb-0">Schedule online or in-clinic appointments</p>
    </div>
  </div>

  <main class="container pb-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="form-card">
          <form id="consultationForm">
            <div class="mb-3">
              <label for="name" class="form-label">Full Name</label>
              <input type="text" class="form-control" id="name" required placeholder="Enter your full name">
            </div>
            <div class="mb-3">
              <label for="phone" class="form-label">Phone Number</label>
              <input type="tel" class="form-control" id="phone" required placeholder="10-digit mobile number">
            </div>
            <div class="mb-3">
              <label for="problem" class="form-label">Health Problem</label>
              <textarea class="form-control" id="problem" rows="4" required placeholder="Describe your symptoms or concern"></textarea>
            </div>
            <div class="mb-3">
              <label for="mode" class="form-label">Consultation Mode</label>
              <select class="form-select" id="mode" required>
                <option value="">Select mode</option>
                <option value="online">Online</option>
                <option value="offline">Offline (In-clinic)</option>
              </select>
            </div>
            <div class="mb-4">
              <label for="date" class="form-label">Preferred Date</label>
              <input type="date" class="form-control" id="date" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg">
              <i class="bi bi-calendar-check me-2"></i>Submit Booking
            </button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container text-center">
      <p class="mb-0">&copy; 2026 GSR Homeocare System</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
