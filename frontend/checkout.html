<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | GSR Homeocare</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">GSR</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center"></ul>
      </div>
    </div>
  </nav>

  <div class="page-header">
    <div class="container">
      <h1 class="section-title mb-0">Checkout</h1>
      <p class="text-muted mb-0">Review cart and choose payment method</p>
    </div>
  </div>

  <main class="container pb-5">
    <div class="row g-4">
      <div class="col-lg-7">
        <div class="form-card">
          <h5 class="mb-3"><i class="bi bi-person me-2"></i>Delivery details</h5>
          <form id="checkoutForm">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Full name *</label>
                <input type="text" class="form-control" id="customerName" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Phone *</label>
                <input type="tel" class="form-control" id="phone" required placeholder="10-digit mobile">
              </div>
              <div class="col-12">
                <label class="form-label">Email (optional)</label>
                <input type="email" class="form-control" id="email">
              </div>
              <div class="col-12">
                <label class="form-label">Delivery address *</label>
                <textarea class="form-control" id="address" rows="2" required></textarea>
              </div>
            </div>

            <h5 class="mt-4 mb-3"><i class="bi bi-credit-card me-2"></i>Payment method</h5>
            <div class="payment-options">
              <label class="payment-option">
                <input type="radio" name="paymentMethod" value="COD" checked>
                <span><i class="bi bi-cash-coin"></i> Cash on Delivery</span>
              </label>
              <label class="payment-option">
                <input type="radio" name="paymentMethod" value="UPI">
                <span><i class="bi bi-phone"></i> UPI (Demo — marks as paid)</span>
              </label>
              <label class="payment-option">
                <input type="radio" name="paymentMethod" value="CARD">
                <span><i class="bi bi-credit-card-2-front"></i> Card (Demo — marks as paid)</span>
              </label>
              <label class="payment-option">
                <input type="radio" name="paymentMethod" value="ONLINE">
                <span><i class="bi bi-globe"></i> Online Pay (Demo — marks as paid)</span>
              </label>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100 mt-4">
              <i class="bi bi-bag-check me-2"></i>Place Order
            </button>
          </form>
        </div>
      </div>

      <div class="col-lg-5">
        <div class="form-card">
          <h5 class="mb-3">Order summary</h5>
          <div id="checkoutCartItems"></div>
          <hr>
          <div class="d-flex justify-content-between fs-5">
            <strong>Total</strong>
            <strong class="price-tag" id="checkoutTotal">₹0.00</strong>
          </div>
          <a href="medicines.html" class="btn btn-outline-primary w-100 mt-3">Continue shopping</a>
        </div>
      </div>
    </div>

    <div id="orderSuccess" class="d-none mt-4">
      <div class="info-card p-4 text-center">
        <i class="bi bi-check-circle-fill text-success display-4"></i>
        <h4 class="mt-3">Order placed successfully!</h4>
        <p id="orderSuccessMsg" class="mb-3"></p>
        <a href="orders.html" class="btn btn-primary me-2">View my orders</a>
        <a href="tracking.html" class="btn btn-outline-primary">Track order</a>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container text-center"><p class="mb-0">&copy; 2026 GSR Homeocare System</p></div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/config.js"></script>
  <script src="js/script.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
