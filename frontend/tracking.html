<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Tracking | GSR Homeocare System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">GSR</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center"></ul>
      </div>
    </div>
  </nav>

  <div class="page-header">
    <div class="container">
      <h1 class="section-title mb-0">Track Your Order</h1>
      <p class="text-muted mb-0">Enter your order ID to view current status</p>
    </div>
  </div>

  <main class="container pb-5">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="form-card">
          <form id="trackingForm">
            <div class="mb-3">
              <label for="orderId" class="form-label">Order ID</label>
              <input type="text" class="form-control form-control-lg" id="orderId" required placeholder="Paste order ID from checkout">
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg">
              <i class="bi bi-search me-2"></i>Track Order
            </button>
          </form>
          <div id="trackingResult" class="d-none"></div>
        </div>

        <div class="info-card p-4 mt-4">
          <h5>Order Status Guide</h5>
          <ul class="list-unstyled mb-0">
            <li class="mb-2"><span class="status-badge status-Ordered">Ordered</span> — Order received</li>
            <li class="mb-2"><span class="status-badge status-Processing">Processing</span> — Being prepared</li>
            <li class="mb-2"><span class="status-badge status-Shipped">Shipped</span> — Out for delivery</li>
            <li><span class="status-badge status-Delivered">Delivered</span> — Successfully delivered</li>
          </ul>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container text-center">
      <p class="mb-0">&copy; 2026 GSR Homeocare System</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/config.js"></script>
  <script src="js/script.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
