  <nav class="navbar navbar-expand-lg navbar-light sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html"><i class="bi bi-heart-pulse-fill me-2"></i>GSR Homeocare</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>

        </ul>

      <h1 class="section-title mb-0">My Order History</h1>
      <p class="text-muted mb-0">Login required — view your order history</p>
    </div>
  </div>

  <main class="container pb-5">
    <div class="form-card mb-4">
      <form id="orderHistoryForm" class="row g-3 align-items-end">
        <div class="col-md-8">
          <label class="form-label">Your phone number</label>
          <input type="tel" class="form-control form-control-lg" id="historyPhone" required placeholder="Same number used at checkout">
        </div>
        <div class="col-md-4">
          <button type="submit" class="btn btn-primary btn-lg w-100">
            <i class="bi bi-search me-2"></i>Load orders
          </button>
        </div>
      </form>
    </div>

    <div class="container text-center"><p class="mb-0">&copy; 2026 GSR Homeocare System</p></div>
