<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medicines | GSR Homeo Care Centre</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">GSR</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center"></ul>
      </div>
    </div>
  </nav>

  <div class="page-header">
    <div class="container">
      <h1 class="section-title mb-0">Our Medicines</h1>
      <p class="text-muted mb-0">Homeopathic medicines with dosage usage and reminder alarms</p>
    </div>
  </div>

  <main class="container pb-5">
    <div class="row mb-4 align-items-center">
      <div class="col-md-8">
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-search"></i></span>
          <input type="text" id="medicineSearch" class="form-control" placeholder="Search medicines by name or usage...">
        </div>
      </div>
      <div class="col-md-4 mt-3 mt-md-0 text-md-end d-flex gap-2 justify-content-md-end">
        <a href="alarms.html" class="btn btn-outline-success"><i class="bi bi-alarm me-1"></i>My Alarms</a>
        <a href="checkout.html" class="btn btn-primary"><i class="bi bi-bag-check me-1"></i>Checkout</a>
      </div>
    </div>

    <div id="medicinesContainer" class="row">
      <div class="col-12 text-center py-5">
        <div class="spinner-border text-success" role="status"></div>
        <p class="mt-2 text-muted">Loading medicines...</p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container text-center">
      <p class="mb-0">&copy; 2026 GSR Homeo Care Centre</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/config.js"></script>
  <script src="js/alarms.js"></script>
  <script src="js/script.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
